name: weekly-report-monshin
# 毎週金曜17:00 JST：外来問診(monshin_records)の最新データを集計→バックアップJSONをrepoへ保存→Slack #michiru便 へ投稿。
# ※CURB-65(金16:00)とは時刻をずらして併存。要Secret: SLACK_WEBHOOK_MICHIRUBIN（curb65-kirokuリポジトリに登録済みを流用）。
on:
  schedule:
    - cron: '0 8 * * 5'   # 金 08:00 UTC = 17:00 JST
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 集計・バックアップ・Slack送信
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_MICHIRUBIN }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::error::SLACK_WEBHOOK_MICHIRUBIN が未設定です。"
            exit 1
          fi
          SB_URL="https://padogdidlrzfuysjzcsf.supabase.co/rest/v1/monshin_records"
          SB_KEY="sb_publishable_LWQ4rBSGPWViDk0pXeY_Mg_ooaMGq1V"
          curl -sf "$SB_URL?select=*&order=id.asc" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" -o data.json

          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          STAMP=$(TZ=Asia/Tokyo date +%Y%m%d)
          BFILE="monshin_backup_${STAMP}.json"

          # --- バックアップをrepoに保存（変更があればコミット） ---
          mkdir -p backups
          cp data.json "backups/${BFILE}"
          git config user.name "report-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "backups/${BFILE}"
          if ! git diff --cached --quiet; then
            git commit -m "weekly monshin backup ${STAMP}（自動）"
            git push
          fi
          BLINK="https://github.com/mi5chi5run-del/curb65-kiroku/blob/main/backups/${BFILE}"

          # --- 集計（jq） ---
          COUNT=$(jq 'length' data.json)
          if [ "$COUNT" -gt 0 ]; then
            # 年齢 mean±SD（母標準偏差）
            AGE=$(jq -r '
              [.[].age | numbers] as $a
              | if ($a|length)>0 then
                  ($a|add/length) as $m
                  | ($a|map((.-$m)*(.-$m))|add/length|sqrt) as $sd
                  | "\($m*10|round/10) ± \($sd*10|round/10)"
                else "-" end' data.json)
            MALE=$(jq '[.[]|select(.sex=="男")]|length' data.json)
            FEMALE=$(jq '[.[]|select(.sex=="女")]|length' data.json)
            SNEVER=$(jq '[.[]|select(.smoking_status=="非喫煙")]|length' data.json)
            SEX_=$(jq '[.[]|select(.smoking_status=="元喫煙")]|length' data.json)
            SCUR=$(jq '[.[]|select(.smoking_status=="現喫煙")]|length' data.json)
            # 有訴率（「あり」割合）: 代表項目
            rate(){ jq -r --arg k "$1" '
              ([.[]|select(.[$k]=="あり" or .[$k]=="なし")]|length) as $v
              | ([.[]|select(.[$k]=="あり")]|length) as $p
              | if $v>0 then "\(($p*1000/$v|round)/10)%" else "-" end' data.json; }
            R_ASTHMA=$(rate asthma); R_HAY=$(rate hay_fever)
            R_JOB=$(rate dust_exposure_job); R_BIRD=$(rate bird)
            R_DOG=$(rate dog); R_CAT=$(rate cat)
            LINES=$(printf '・年齢 %s ／ 男性 %s名 / 女性 %s名\n・喫煙 非喫煙 %s名 / 元喫煙 %s名 / 現喫煙 %s名\n・有訴率 喘息 %s ／ 花粉症 %s ／ 職業曝露 %s ／ 鳥 %s ／ 犬 %s ／ 猫 %s' \
              "$AGE" "$MALE" "$FEMALE" "$SNEVER" "$SEX_" "$SCUR" "$R_ASTHMA" "$R_HAY" "$R_JOB" "$R_BIRD" "$R_DOG" "$R_CAT")
          else
            LINES="（まだ回答がありません）"
          fi

          MSG=$(printf ':rabbit: *外来問診 週次レポート*（ダミー・n=%s）\n集計日 %s\n%s\n\n:warning: 架空のダミーデータのみ／集計のみ／T26承認前。実患者データは含みません。\n\n:floppy_disk: バックアップ <%s|%s> をrepoに保存済み。\n:globe_with_meridians: 入力URL（ダミー専用・noindex済み）：https://mi5chi5run-del.github.io/curb65-kiroku/monshin/' \
            "$COUNT" "$DATE" "$LINES" "$BLINK" "$BFILE")

          jq -n --arg t "$MSG" '{text:$t}' > payload.json
          curl -sf -X POST -H 'Content-type: application/json' --data @payload.json "$WEBHOOK" && echo "Slack送信成功"
