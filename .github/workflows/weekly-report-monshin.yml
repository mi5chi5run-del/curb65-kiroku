name: weekly-report-monshin
# 毎週金曜17:00 JST：外来問診(monshin_records)を集計→PDFレポート生成→Slack #michiru便へ「PDF添付」で送信。
# 非公開設計：Supabaseの鍵・URLは直書きせずSecretから読む。PDFはActionsで作りその場で添付（生データのrepo公開はしない）。
# 要Secret（美千瑠さん登録）:
#   SLACK_BOT_TOKEN … Slack Bot token（scope: files:write。#michiru便 にbotを招待しておく）
#   MONSHIN_SB_URL  … 外来問診専用Supabaseの Project URL
#   MONSHIN_SB_KEY  … その anon(publishable) キー
on:
  schedule:
    - cron: '0 8 * * 5'   # 金 08:00 UTC = 17:00 JST
  workflow_dispatch: {}
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 依存関係（matplotlib・日本語フォント・jq）
        run: |
          pip install matplotlib
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk jq
      - name: 集計・PDF生成・Slack添付
        env:
          BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SB_URL:    ${{ secrets.MONSHIN_SB_URL }}
          SB_KEY:    ${{ secrets.MONSHIN_SB_KEY }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$SB_URL" ] || [ -z "$SB_KEY" ]; then
            echo "::error::必要なSecretが未設定です（SLACK_BOT_TOKEN / MONSHIN_SB_URL / MONSHIN_SB_KEY）。"
            exit 1
          fi
          # データ取得
          curl -sf "$SB_URL/rest/v1/monshin_records?select=*&order=id.asc" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" -o data.json
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d); STAMP=$(TZ=Asia/Tokyo date +%Y%m%d)
          COUNT=$(jq 'length' data.json)

          # コメント用の軽い集計
          if [ "$COUNT" -gt 0 ]; then
            AGE=$(jq -r '[.[].age|numbers] as $a | if ($a|length)>0 then ($a|add/length) as $m | ($a|map((.-$m)*(.-$m))|add/length|sqrt) as $sd | "\($m*10|round/10) ± \($sd*10|round/10)" else "-" end' data.json)
            MALE=$(jq '[.[]|select(.sex=="男")]|length' data.json); FEMALE=$(jq '[.[]|select(.sex=="女")]|length' data.json)
            SN=$(jq '[.[]|select(.smoking_status=="非喫煙")]|length' data.json)
            SE=$(jq '[.[]|select(.smoking_status=="元喫煙")]|length' data.json)
            SC=$(jq '[.[]|select(.smoking_status=="現喫煙")]|length' data.json)
            SUM=$(printf '・年齢 %s ／ 男性 %s名 / 女性 %s名\n・喫煙 非喫煙 %s名 / 元喫煙 %s名 / 現喫煙 %s名' "$AGE" "$MALE" "$FEMALE" "$SN" "$SE" "$SC")
          else
            SUM="（まだ回答がありません）"
          fi

          # PDF生成
          REPORT_DATE="$DATE" python scripts/monshin_report.py
          test -f report.pdf || { echo "::error::PDF生成に失敗"; exit 1; }

          # Slackへ添付（files.upload v2：URL取得→PUT→完了通知）
          SIZE=$(stat -c%s report.pdf)
          RESP=$(curl -s -G "https://slack.com/api/files.getUploadURLExternal" \
            -H "Authorization: Bearer $BOT_TOKEN" \
            --data-urlencode "filename=外来問診_週次レポート_${STAMP}.pdf" \
            --data-urlencode "length=$SIZE")
          [ "$(echo "$RESP" | jq -r .ok)" = "true" ] || { echo "::error::getUploadURLExternal失敗: $RESP"; exit 1; }
          UURL=$(echo "$RESP" | jq -r .upload_url); FID=$(echo "$RESP" | jq -r .file_id)
          curl -s -F filename=@report.pdf "$UURL" >/dev/null

          MSG=$(printf ':rabbit: *外来問診 週次レポート*（ダミー・n=%s）\n集計日 %s\n%s\n\n:warning: 架空のダミーデータ・集計のみ／T26承認前。詳細は添付PDF（集計＋グラフ＋症例一覧）。' "$COUNT" "$DATE" "$SUM")
          PAYLOAD=$(jq -n --arg fid "$FID" --arg ch "C0BFGN8T87P" --arg c "$MSG" \
            '{files:[{id:$fid,title:"外来問診 週次レポート"}],channel_id:$ch,initial_comment:$c}')
          RESP2=$(curl -s "https://slack.com/api/files.completeUploadExternal" \
            -H "Authorization: Bearer $BOT_TOKEN" -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")
          [ "$(echo "$RESP2" | jq -r .ok)" = "true" ] || { echo "::error::completeUploadExternal失敗: $RESP2"; exit 1; }
          echo "Slack添付送信成功"
