name: weekly-report-monshin
# 毎週金曜17:00 JST：外来問診(monshin_records)を集計→
#   ①バックアップJSONをrepoへ保存 ②閲覧レポートHTML(鍵なし・noindex)を公開 ③PDF生成
#   ④うさ子(🐰)名義でバックアップレポート文面を投稿し、そのスレッドにPDFを添付。
# 要Secret: SLACK_BOT_TOKEN（files:write＋chat:write.customize／#michiru便にbot招待済み）／MONSHIN_SB_URL／MONSHIN_SB_KEY
on:
  schedule:
    - cron: '0 8 * * 5'   # 金 08:00 UTC = 17:00 JST
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: 依存関係（matplotlib・日本語フォント・jq）
        run: |
          pip install matplotlib
          sudo apt-get update && sudo apt-get install -y fonts-noto-cjk jq
      - name: 集計・公開・PDF・うさ子で投稿
        env:
          BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SB_URL:    ${{ secrets.MONSHIN_SB_URL }}
          SB_KEY:    ${{ secrets.MONSHIN_SB_KEY }}
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$SB_URL" ] || [ -z "$SB_KEY" ]; then
            echo "::error::必要なSecretが未設定です（SLACK_BOT_TOKEN / MONSHIN_SB_URL / MONSHIN_SB_KEY）。"; exit 1
          fi
          curl -sf "$SB_URL/rest/v1/monshin_records?select=*&order=id.asc" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" -o data.json
          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d); STAMP=$(TZ=Asia/Tokyo date +%Y%m%d)
          BFILE="monshin_backup_${STAMP}.json"
          COUNT=$(jq 'length' data.json)

          # --- 集計 ---
          if [ "$COUNT" -gt 0 ]; then
            AGE=$(jq -r '[.[].age|numbers] as $a | if ($a|length)>0 then ($a|add/length) as $m | ($a|map((.-$m)*(.-$m))|add/length|sqrt) as $sd | "\($m*10|round/10) ± \($sd*10|round/10)" else "-" end' data.json)
            MALE=$(jq '[.[]|select(.sex=="男")]|length' data.json); FEMALE=$(jq '[.[]|select(.sex=="女")]|length' data.json)
            SN=$(jq '[.[]|select(.smoking_status=="非喫煙")]|length' data.json)
            SE=$(jq '[.[]|select(.smoking_status=="元喫煙")]|length' data.json)
            SC=$(jq '[.[]|select(.smoking_status=="現喫煙")]|length' data.json)
            rate(){ jq -r --arg k "$1" '([.[]|select(.[$k]=="あり" or .[$k]=="なし")]|length) as $v | ([.[]|select(.[$k]=="あり")]|length) as $p | if $v>0 then "\(($p*1000/$v|round)/10)%" else "-" end' data.json; }
            R_ASTHMA=$(rate asthma); R_HAY=$(rate hay_fever); R_JOB=$(rate dust_exposure_job)
            R_BIRD=$(rate bird); R_DOG=$(rate dog); R_CAT=$(rate cat)
            LINES=$(printf '・年齢 %s ／ 男性 %s名 / 女性 %s名\n・喫煙 非喫煙 %s名 / 元喫煙 %s名 / 現喫煙 %s名\n・有訴率 喘息 %s ／ 花粉症 %s ／ 職業曝露 %s ／ 鳥 %s ／ 犬 %s ／ 猫 %s' \
              "$AGE" "$MALE" "$FEMALE" "$SN" "$SE" "$SC" "$R_ASTHMA" "$R_HAY" "$R_JOB" "$R_BIRD" "$R_DOG" "$R_CAT")
            ROWS=$(jq -r '.[] | [.patient_id,(.visit_date//"-"),(.age|tostring),(.sex//"-"),(.smoking_status//"-"),(.visit_reason//"-")] | join(" | ")' data.json)
          else
            LINES="（まだ回答がありません）"; ROWS="（記録なし）"
          fi
          FENCE='```'
          TABLE=$(printf '%s\n%s\n%s\n%s' "$FENCE" "患者ID | 受診日 | 年齢 | 性別 | 喫煙 | 来院理由" "$ROWS" "$FENCE")

          # --- ①バックアップJSON ---
          mkdir -p backups; cp data.json "backups/${BFILE}"

          # --- ②閲覧レポートHTML（鍵なし・データ静的埋め込み・noindex）---
          mkdir -p monshin-report
          {
            echo '<!doctype html><html lang="ja"><head><meta charset="utf-8">'
            echo '<meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">'
            echo '<title>外来問診記録版 レポート（ダミー）</title>'
            echo '<style>body{font-family:"Yu Gothic",Meiryo,sans-serif;margin:0;background:#f4f6f8;color:#1f2933;line-height:1.6}'
            echo 'header{background:#2f855a;color:#fff;padding:16px 20px}header h1{margin:0;font-size:19px}header p{margin:4px 0 0;font-size:13px;opacity:.92}'
            echo '.wrap{max-width:960px;margin:0 auto;padding:18px 14px 60px}.card{background:#fff;border:1px solid #e3e8ee;border-radius:10px;padding:14px 16px;margin-bottom:16px}'
            echo 'h2{font-size:15px;margin:0 0 10px;border-bottom:1px solid #e3e8ee;padding-bottom:6px}'
            echo '.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:8px;padding:9px 12px;font-size:13px;margin-bottom:14px}'
            echo 'table{border-collapse:collapse;width:100%;font-size:13px}th,td{border:1px solid #e3e8ee;padding:6px 8px;text-align:left;white-space:nowrap}th{background:#eef5f0;color:#276749}'
            echo '.tbl-wrap{overflow-x:auto}.sum{font-size:14px}.foot{font-size:12px;color:#66707a}</style></head><body>'
            echo '<header><h1>呼吸器外来 問診記録版 ｜ レポート</h1><p>Supabaseに蓄積したダミー症例の集計・一覧（閲覧専用・書き込み不可）</p></header>'
            echo '<div class="wrap">'
            echo "<div class=\"warn\">⚠ 架空のダミーデータのみ／実患者データは含みません。集計日 ${DATE}／登録 ${COUNT}件</div>"
            echo '<div class="card"><h2>集計</h2><div class="sum">'
            echo "$LINES" | sed 's/$/<br>/'
            echo '</div></div>'
            echo '<div class="card"><h2>記録一覧（主要項目）</h2><div class="tbl-wrap"><table>'
            echo '<thead><tr><th>患者ID</th><th>受診日</th><th>年齢</th><th>性別</th><th>喫煙</th><th>来院理由</th><th>胸部症状</th></tr></thead><tbody>'
            jq -r '.[] | "<tr><td>\(.patient_id//"")</td><td>\(.visit_date//"")</td><td>\(.age//"")</td><td>\(.sex//"")</td><td>\(.smoking_status//"")</td><td>\(.visit_reason//"")</td><td>\(.chest_abnormality//"")</td></tr>"' data.json
            echo '</tbody></table></div></div>'
            echo "<p class=\"foot\">呼吸器外来問診票（全項目版・89列）に基づく。全項目はバックアップJSONを参照。生成 ${DATE}。</p>"
            echo '</div></body></html>'
          } > monshin-report/index.html

          git config user.name "report-bot"; git config user.email "actions@users.noreply.github.com"
          git add "backups/${BFILE}" monshin-report/index.html
          if ! git diff --cached --quiet; then git commit -m "monshin weekly report ${STAMP}（自動）"; git push; fi
          HLINK="https://mi5chi5run-del.github.io/curb65-kiroku/monshin-report/"
          JLINK="https://github.com/mi5chi5run-del/curb65-kiroku/blob/main/backups/${BFILE}"

          # --- ③PDF生成 ---
          REPORT_DATE="$DATE" python scripts/monshin_report.py
          test -f report.pdf || { echo "::error::PDF生成に失敗"; exit 1; }

          # --- ④うさ子(🐰)名義で本文投稿 → そのスレッドにPDF添付 ---
          MSG=$(printf ':rabbit: *外来問診記録版 バックアップレポート*（%s 時点）\n\n呼吸器外来問診票（全項目版）の練習アプリ（Supabase・入力ページは非公開運用）に蓄積したダミー症例の書き出しです。\n:warning: 架空のダミーデータのみ／実患者データは含みません。\n\n*登録件数：%s件*\n\n%s\n\n%s\n\n:page_facing_up: 閲覧レポート（ダミー専用・書き込み不可・noindex）：%s\n:floppy_disk: バックアップJSON <%s|%s> をrepoに保存済み。' \
            "$DATE" "$COUNT" "$LINES" "$TABLE" "$HLINK" "$JLINK" "$BFILE")
          POST=$(curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $BOT_TOKEN" -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n --arg ch "C0BFGN8T87P" --arg u "みちる自動便" --arg t "$MSG" '{channel:$ch,username:$u,icon_emoji:":rabbit:",text:$t}')")
          [ "$(echo "$POST" | jq -r .ok)" = "true" ] || { echo "::error::chat.postMessage失敗: $POST"; exit 1; }
          TS=$(echo "$POST" | jq -r .ts)

          SIZE=$(stat -c%s report.pdf)
          RESP=$(curl -s -G "https://slack.com/api/files.getUploadURLExternal" -H "Authorization: Bearer $BOT_TOKEN" \
            --data-urlencode "filename=外来問診_週次レポート_${STAMP}.pdf" --data-urlencode "length=$SIZE")
          [ "$(echo "$RESP" | jq -r .ok)" = "true" ] || { echo "::error::getUploadURLExternal失敗: $RESP"; exit 1; }
          UURL=$(echo "$RESP" | jq -r .upload_url); FID=$(echo "$RESP" | jq -r .file_id)
          curl -s -F filename=@report.pdf "$UURL" >/dev/null
          RESP2=$(curl -s "https://slack.com/api/files.completeUploadExternal" \
            -H "Authorization: Bearer $BOT_TOKEN" -H "Content-Type: application/json; charset=utf-8" \
            -d "$(jq -n --arg fid "$FID" --arg ch "C0BFGN8T87P" --arg ts "$TS" '{files:[{id:$fid,title:"外来問診 週次レポート"}],channel_id:$ch,thread_ts:$ts}')")
          [ "$(echo "$RESP2" | jq -r .ok)" = "true" ] || { echo "::error::completeUploadExternal失敗: $RESP2"; exit 1; }
          echo "うさ子で投稿＋PDFスレッド添付 成功"
