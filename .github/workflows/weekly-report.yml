name: weekly-report
# 毎週金曜16:00 JST：Supabase最新データを集計→バックアップJSONをrepoへ保存→Slack #michiru便 へ投稿。
# 要Secret: SLACK_WEBHOOK_MICHIRUBIN（#michiru便 Incoming Webhook URL）
on:
  schedule:
    - cron: '0 7 * * 5'   # 金 07:00 UTC = 16:00 JST
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 集計・バックアップ・Slack送信
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_MICHIRUBIN }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "::error::SLACK_WEBHOOK_MICHIRUBIN が未設定です。"
            exit 1
          fi
          SB_URL="https://padogdidlrzfuysjzcsf.supabase.co/rest/v1/curb65_records"
          SB_KEY="sb_publishable_LWQ4rBSGPWViDk0pXeY_Mg_ooaMGq1V"
          curl -sf "$SB_URL?select=*&order=id.asc" \
            -H "apikey: $SB_KEY" -H "Authorization: Bearer $SB_KEY" -o data.json

          DATE=$(TZ=Asia/Tokyo date +%Y-%m-%d)
          STAMP=$(TZ=Asia/Tokyo date +%Y%m%d)
          BFILE="curb65_backup_${STAMP}.json"

          # --- バックアップをrepoに保存（変更があればコミット） ---
          mkdir -p backups
          cp data.json "backups/${BFILE}"
          git config user.name "report-bot"
          git config user.email "actions@users.noreply.github.com"
          git add "backups/${BFILE}"
          if ! git diff --cached --quiet; then
            git commit -m "weekly backup ${STAMP}（自動）"
            git push
          fi
          BLINK="https://github.com/mi5chi5run-del/curb65-kiroku/blob/main/backups/${BFILE}"

          # --- 集計 ---
          COUNT=$(jq 'length' data.json)
          HIGH=$(jq '[.[]|select(.risk_class=="high")]|length' data.json)
          MID=$(jq '[.[]|select(.risk_class=="mid")]|length' data.json)
          LOW=$(jq '[.[]|select(.risk_class=="low")]|length' data.json)
          if [ "$COUNT" -gt 0 ]; then
            MEAN=$(jq '[.[].total_score]|add/length' data.json | xargs printf "%.1f")
            ROWS=$(jq -r '.[] | [
              .patient_label,
              (.assessed_on // "-"),
              (if .confusion==1 then "あり" else "なし" end),
              (.bun|tostring), (.resp_rate|tostring),
              ((.sbp|tostring)+"/"+(.dbp|tostring)),
              (.age|tostring), ((.total_score|tostring)+"/5"),
              (if .risk_class=="high" then "高" elif .risk_class=="mid" then "中" else "低" end)
            ] | join(" | ")' data.json)
          else
            MEAN="0.0"; ROWS="（記録なし）"
          fi
          FENCE='```'
          HEADER='ラベル | 評価日 | C | BUN | RR | BP | 年齢 | スコア | リスク'
          TABLE=$(printf '%s\n%s\n%s\n%s' "$FENCE" "$HEADER" "$ROWS" "$FENCE")

          BREAKDOWN="高リスク ${HIGH}件"
          [ "$MID" -gt 0 ] && BREAKDOWN="${BREAKDOWN} ／ 中等度 ${MID}件"
          BREAKDOWN="${BREAKDOWN} ／ 低リスク ${LOW}件"

          MSG=$(printf ':bar_chart: *CURB-65記録版 バックアップレポート*（%s 時点）\n\nミニアプリ講座6-6の練習アプリ（Supabase＋GitHub Pages）に蓄積したダミー症例の書き出しです。\n:warning: 架空のダミーデータのみ／実患者データは含みません。\n\n*登録件数：%s件*\n\n%s\n\n*リスク内訳*：%s\n*平均CURB-65スコア*：%s 点\n\n:floppy_disk: バックアップファイル <%s|%s> をrepoに保存済み。\n:globe_with_meridians: 公開URL（ダミー専用・検索除けnoindex済み）：https://mi5chi5run-del.github.io/curb65-kiroku/' \
            "$DATE" "$COUNT" "$TABLE" "$BREAKDOWN" "$MEAN" "$BLINK" "$BFILE")

          jq -n --arg t "$MSG" '{text:$t}' > payload.json
          curl -sf -X POST -H 'Content-type: application/json' --data @payload.json "$WEBHOOK" && echo "Slack送信成功"
