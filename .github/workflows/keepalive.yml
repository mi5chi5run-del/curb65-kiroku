name: keepalive
# Supabase無料枠の「7日無アクセスで一時停止→90日で削除」を防ぐ番犬。
# 毎日1回RESTにアクセスし、リポジトリ自体の休眠(60日で定期実行停止)も防ぐ。
on:
  schedule:
    - cron: '0 21 * * *'   # 毎日 06:00 JST（21:00 UTC）
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Supabaseにアクセスして一時停止を防ぐ
        run: |
          curl -sf -o /dev/null -w "Supabase ping HTTP %{http_code}\n" \
            "https://padogdidlrzfuysjzcsf.supabase.co/rest/v1/curb65_records?select=id&limit=1" \
            -H "apikey: sb_publishable_LWQ4rBSGPWViDk0pXeY_Mg_ooaMGq1V" \
            -H "Authorization: Bearer sb_publishable_LWQ4rBSGPWViDk0pXeY_Mg_ooaMGq1V"
      - uses: actions/checkout@v4
      - name: リポジトリの休眠を防ぐ（前回コミットから50日超なら空コミット）
        run: |
          last=$(git log -1 --format=%ct)
          days=$(( ( $(date +%s) - last ) / 86400 ))
          echo "最終コミットから ${days} 日"
          if [ "$days" -ge 50 ]; then
            git config user.name "keepalive-bot"
            git config user.email "actions@users.noreply.github.com"
            git commit --allow-empty -m "keepalive: 定期実行の休止防止（自動）"
            git push
          fi
