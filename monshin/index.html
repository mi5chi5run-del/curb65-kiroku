<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>外来問診記録版（Supabase版・全端末共有）</title>
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --ink:#1f2933; --sub:#66707a; --line:#e3e8ee;
    --accent:#2f855a; --accent2:#276749; --warn:#d97706; --danger:#dc2626;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink); line-height:1.6;
    font-family:"Yu Gothic","游ゴシック",YuGothic,"Meiryo",sans-serif; -webkit-font-smoothing:antialiased;}
  header{background:var(--accent); color:#fff; padding:16px 20px}
  header h1{margin:0; font-size:20px}
  header p{margin:4px 0 0; font-size:13px; opacity:.92}
  .wrap{max-width:860px; margin:0 auto; padding:20px 16px 70px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:16px}
  h2{font-size:15px; margin:0 0 12px; padding-bottom:8px; border-bottom:1px solid var(--line)}
  details.sec{border:1px solid var(--line); border-radius:9px; margin-bottom:10px; overflow:hidden}
  details.sec>summary{cursor:pointer; padding:11px 14px; font-weight:700; font-size:14px; background:#eef5f0; color:var(--accent2); list-style:none}
  details.sec>summary::-webkit-details-marker{display:none}
  details.sec>summary::before{content:"▸ "; color:var(--accent)}
  details.sec[open]>summary::before{content:"▾ "}
  .sec-body{padding:12px 14px}
  label{display:block; font-size:13px; color:var(--sub); margin:10px 0 4px}
  label .req{color:var(--danger)}
  input,select,textarea{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:7px; font:inherit; color:var(--ink); background:#fff;}
  input[readonly]{background:#f3f5f7; color:var(--sub)}
  textarea{min-height:60px; resize:vertical}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px 14px}
  .btns{margin-top:14px; display:flex; gap:8px; flex-wrap:wrap}
  button.act{font:inherit; cursor:pointer; border:none; border-radius:7px; padding:10px 18px}
  .primary{background:var(--accent); color:#fff}
  .ghost{background:#eef2f6; color:var(--ink)}
  .primary:disabled{opacity:.6; cursor:default}
  .note{font-size:12px; color:var(--sub); margin-top:12px; background:#fbfcfd; border:1px dashed var(--line); border-radius:7px; padding:9px 11px}
  .toolbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px}
  .toolbar input{width:auto; flex:1; min-width:150px}
  .count{font-size:13px; color:var(--sub)}
  .backup{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px}
  .mini{font:inherit; font-size:12px; cursor:pointer; border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:6px; padding:6px 12px}
  .mini:hover{background:#f0f2f5}
  .rec{border:1px solid var(--line); border-radius:9px; padding:11px 14px; margin-bottom:10px}
  .rec.editing{border-color:var(--accent); box-shadow:0 0 0 2px rgba(47,133,90,.15)}
  .rec-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px}
  .rec-name{font-weight:700; font-size:15px}
  .rec-meta{font-size:12px; color:var(--sub); margin-top:4px}
  .tags{margin-top:6px; display:flex; gap:5px; flex-wrap:wrap}
  .tag{font-size:11px; background:#eef5f0; color:var(--accent2); border-radius:999px; padding:2px 9px}
  .rec-actions{display:flex; gap:6px; flex-shrink:0}
  .edit{background:#fff; color:var(--accent); border:1px solid var(--accent); padding:5px 10px; font-size:12px; border-radius:6px; cursor:pointer}
  .danger{background:#fff; color:var(--danger); border:1px solid var(--danger); padding:5px 10px; font-size:12px; border-radius:6px; cursor:pointer}
  .empty{text-align:center; color:var(--sub); padding:26px 10px; font-size:14px}
  /* 集計 */
  .sum{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:12px}
  .stat{background:#f7faf8; border:1px solid var(--line); border-radius:8px; padding:10px 12px}
  .stat .k{font-size:12px; color:var(--sub)} .stat .v{font-size:18px; font-weight:800; color:var(--accent2)}
  .prev .prow{display:flex; align-items:center; gap:8px; margin:3px 0; font-size:13px}
  .prev .plabel{width:130px; flex-shrink:0; color:var(--sub)}
  .prev .pbar{height:12px; background:var(--accent); border-radius:3px; min-width:2px}
  .prev .ppct{font-size:12px; color:var(--sub)}
  .foot{font-size:12px; color:var(--sub)}
  .conn{border-radius:8px; padding:10px 14px; margin-bottom:16px; font-size:13px}
  .conn.ok{background:#ecfdf5; border:1px solid #6ee7b7; color:#065f46}
  .conn.ng{background:#fef2f2; border:1px solid #fca5a5; color:#991b1b}
  .conn code{background:rgba(0,0,0,.06); padding:1px 5px; border-radius:4px}
</style>
</head>
<body>
<header>
  <h1>呼吸器外来 問診記録版（Supabase版）</h1>
  <p>スマホからも入力OK。データはクラウド（Supabase）に保存され、どの端末からも同じ記録が見えます（全端末共有）。</p>
</header>

<div class="wrap">
  <div id="connBanner" class="conn ng">接続情報を確認中…</div>

  <div class="card">
    <h2 id="formTitle">新しい問診を記録</h2>
    <div id="form"></div>
    <div class="btns">
      <button class="act primary" id="btnSave">記録する</button>
      <button class="act ghost" id="btnCancel" style="display:none">編集をやめる</button>
    </div>
    <p class="note">⚠ この版はクラウド（Supabase）に保存します。ポリシーは全開放（URLを知る人は誰でも読み書き可）なので、<b>実在患者データは載せず、ダミーデータ専用</b>にしてください。実データは大学承認（T26）のうえ REDCap で。</p>
  </div>

  <div class="card">
    <h2>集計（蓄積データのサマリー）</h2>
    <div class="sum" id="summary"></div>
    <div class="prev" id="prevalence"></div>
  </div>

  <div class="card">
    <h2>記録した一覧（クラウド）</h2>
    <div class="toolbar">
      <input type="text" id="searchBox" placeholder="患者ID・主訴で検索">
      <span class="count" id="count"></span>
    </div>
    <div class="backup">
      <button class="mini" id="btnReload">🔄 サーバーから再読み込み</button>
      <button class="mini" id="btnExportJson">💾 JSONで書き出し</button>
      <button class="mini" id="btnExportCsv">📊 CSVで書き出し（Excel/R用）</button>
    </div>
    <div id="list"></div>
  </div>

  <p class="foot">診療の補助・研究用の記録ツールです。呼吸器外来問診票（全項目版）に基づく。※ダミーデータ専用。</p>
</div>

<script>
  'use strict';

  // =====================================================================
  //  接続情報：Supabase プロジェクトの2つの値（Project Settings → API）
  //  ※CURB-65記録版と同じ curb65-kiroku プロジェクトを共用（テーブルだけ別）
  // =====================================================================
  const SUPABASE_URL = 'https://padogdidlrzfuysjzcsf.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_LWQ4rBSGPWViDk0pXeY_Mg_ooaMGq1V';   // publishable key（公開可・RLS前提）

  const TABLE = SUPABASE_URL + '/rest/v1/monshin_records';
  const H = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json'
  };
  const CONFIGURED = !SUPABASE_URL.includes('xxxx') && SUPABASE_KEY.indexOf('ここに') === -1;

  // ===== 問診項目の定義（この配列がフォーム・保存・一覧・集計・CSVの単一の正本）=====
  //  type: num=数値 / date=日付 / text=1行 / area=複数行 / yn=あり/なし / sel=選択肢
  const YN = ['あり', 'なし'];
  const SECTIONS = [
    ['基本情報', [
      ['patient_id','患者ID（匿名）','text',{req:true,ph:'例：ダミー M-01'}],
      ['visit_date','受診日','date'],
      ['age','年齢','num',{unit:'歳'}],
      ['sex','性別','sel',{opts:['男','女']}],
      ['height_cm','身長','num',{unit:'cm'}],
      ['weight_kg','体重','num',{unit:'kg'}],
      ['visit_reason','来院理由','text'],
      ['chest_abnormality','胸部症状・異常','text',{ph:'例：咳・痰・発熱・体重減少 など'}],
    ]],
    ['アレルギー・アトピー素因', [
      ['asthma','気管支喘息','yn'],
      ['asthma_onset_age','喘息発症年齢','num',{unit:'歳'}],
      ['hay_fever','花粉症','yn'],
      ['atopic_dermatitis','アトピー性皮膚炎','yn'],
      ['drug_allergy','薬剤/造影剤アレルギー','yn'],
      ['drug_allergy_detail','アレルギー原因薬剤','text'],
    ]],
    ['自己免疫疾患', [
      ['sle','SLE','yn'],
      ['sjogren','シェーグレン症候群','yn'],
      ['polymyositis','多発性筋炎','yn'],
      ['dermatomyositis','皮膚筋炎','yn'],
      ['rheumatoid_arthritis','関節リウマチ(RA)','yn'],
      ['systemic_sclerosis','強皮症(SSc)','yn'],
      ['vasculitis','血管炎','yn'],
      ['multiple_sclerosis','多発性硬化症','yn'],
      ['crohn','クローン病','yn'],
      ['ulcerative_colitis','潰瘍性大腸炎','yn'],
      ['other_autoimmune','その他自己免疫疾患','text'],
    ]],
    ['感染症・悪性腫瘍の既往', [
      ['covid19','新型コロナ感染症','yn'],
      ['covid19_age','COVID-19罹患年齢','num',{unit:'歳'}],
      ['tuberculosis','結核','yn'],
      ['ntm','非結核性抗酸菌症(NTM)','yn'],
      ['herpes_zoster','帯状疱疹','yn'],
      ['sinusitis','副鼻腔炎','yn'],
      ['hepatitis_bc','B型/C型肝炎','yn'],
      ['lung_cancer','肺がん','yn'],
      ['other_cancer','その他のがん','yn'],
      ['other_cancer_type','がんの種類','text'],
      ['hematologic_malignancy','白血病・リンパ腫・肉腫','yn'],
    ]],
    ['手術歴', [
      ['appendectomy','虫垂切除術','yn'],
      ['tonsillectomy','扁桃摘出術','yn'],
      ['sinus_surgery','副鼻腔炎手術','yn'],
      ['gynecologic_surgery','婦人科手術','yn'],
      ['cholecystectomy','胆嚢摘出術','yn'],
      ['other_surgery','その他の手術','yn'],
      ['other_surgery_detail','手術名・年齢','text'],
    ]],
    ['ワクチン', [
      ['covid_vaccine_doses','新型コロナワクチン接種回数','num',{unit:'回'}],
      ['pneumococcal_vaccine','肺炎球菌ワクチン接種回数','num',{unit:'回'}],
      ['other_vaccine','その他のワクチン','text'],
    ]],
    ['喫煙', [
      ['smoking_status','喫煙状況','sel',{opts:['非喫煙','元喫煙','現喫煙']}],
      ['smoking_start_age','喫煙開始年齢','num',{unit:'歳'}],
      ['smoking_end_age','喫煙終了年齢','num',{unit:'歳',ph:'現在喫煙中なら空欄'}],
      ['cigarettes_per_day','1日本数','num',{unit:'本'}],
      ['pack_years','パックイヤー（自動計算）','num',{ro:true,unit:'PY'}],
    ]],
    ['職業・粉塵曝露', [
      ['longest_occupation','最も長く勤めた職業','text'],
      ['current_occupation','現在の職業','text'],
      ['dust_exposure_job','職業上の粉塵曝露','yn'],
      ['asbestos','アスベスト曝露','yn'],
      ['silica','シリカ曝露','yn'],
      ['wood_dust','木材粉塵曝露','yn'],
      ['metal','金属粉塵曝露','yn'],
      ['coal','石炭粉塵曝露','yn'],
      ['hard_metal','超硬合金曝露','yn'],
      ['other_dust','その他の粉塵','text'],
    ]],
    ['住環境・曝露', [
      ['house_age_years','住居の築年数','num',{unit:'年'}],
      ['house_structure','住居の構造','sel',{opts:['木造','鉄筋コンクリート','鉄骨','その他']}],
      ['mold_exposure','カビが多い','yn'],
      ['humidifier','加湿器の使用','yn'],
      ['feather_bedding','羽毛布団の使用','yn'],
      ['down_jacket','ダウンジャケットの使用','yn'],
      ['gardening','園芸肥料の使用','yn'],
      ['hot_spring_bath','24時間風呂の使用','yn'],
      ['bird','鳥の飼育歴','yn'],
      ['bird_type','鳥の種類','text'],
      ['bird_number','飼育羽数','num',{unit:'羽'}],
      ['dog','犬の飼育歴','yn'],
      ['cat','猫の飼育歴','yn'],
      ['other_pet','その他のペット','text'],
    ]],
    ['家族歴', [
      ['family_asthma','家族・喘息','yn'],
      ['family_tb_ntm','家族・結核/NTM','yn'],
      ['family_autoimmune','家族・膠原病','yn'],
      ['family_lung_cancer','家族・肺がん','yn'],
      ['family_other_cancer','家族・その他のがん','yn'],
      ['family_diabetes','家族・糖尿病','yn'],
      ['family_hypertension','家族・高血圧','yn'],
      ['family_ild_sarcoidosis','家族・間質性肺炎/サルコイドーシス','yn'],
      ['family_relation_detail','続柄・病名の詳細','text'],
    ]],
    ['その他', [
      ['living_with_others','同居者あり','yn'],
      ['household_size','同居人数','num',{unit:'人'}],
      ['pregnancy','妊娠の可能性','yn'],
      ['breastfeeding','授乳中','yn'],
      ['free_comment','特記事項','area'],
    ]],
  ];
  // 全フィールドを平坦化（key→定義）
  const FIELDS = [];
  SECTIONS.forEach(([sec, items]) => items.forEach(([k,label,type,o]) => FIELDS.push({k,label,type,o:o||{},sec})));
  const FMAP = {}; FIELDS.forEach(f => FMAP[f.k] = f);

  const $ = id => document.getElementById(id);
  let records = [];
  let editingId = null;

  // ===== フォームを定義から生成 =====
  function buildForm(){
    let html = '';
    SECTIONS.forEach(([sec, items], si) => {
      html += '<details class="sec"' + (si===0?' open':'') + '><summary>' + esc(sec) + '</summary><div class="sec-body"><div class="grid">';
      items.forEach(([k,label,type,o]) => {
        o = o || {};
        const id = 'f_' + k;
        const req = o.req ? ' <span class="req">*</span>' : '';
        let field;
        if(type === 'yn' || type === 'sel'){
          const opts = type==='yn' ? YN : o.opts;
          field = '<select id="'+id+'"><option value="">—</option>' +
            opts.map(v => '<option value="'+esc(v)+'">'+esc(v)+'</option>').join('') + '</select>';
        } else if(type === 'area'){
          field = '<textarea id="'+id+'" placeholder="'+esc(o.ph||'')+'"></textarea>';
        } else if(type === 'num'){
          field = '<input type="number" step="any" id="'+id+'"'+(o.ro?' readonly':'')+' placeholder="'+esc(o.ph||'')+'">';
        } else if(type === 'date'){
          field = '<input type="date" id="'+id+'">';
        } else {
          field = '<input type="text" id="'+id+'" placeholder="'+esc(o.ph||'')+'">';
        }
        const unit = o.unit ? ' <span style="font-size:12px;color:var(--sub)">'+esc(o.unit)+'</span>' : '';
        html += '<div><label for="'+id+'">'+esc(label)+req+unit+'</label>'+field+'</div>';
      });
      html += '</div></div></details>';
    });
    $('form').innerHTML = html;
    // pack-years 自動計算
    ['cigarettes_per_day','smoking_start_age','smoking_end_age','age'].forEach(k=>{
      const el=$('f_'+k); if(el) el.addEventListener('input', calcPackYears);
    });
  }

  function calcPackYears(){
    const cigs = num('f_cigarettes_per_day');
    const start = num('f_smoking_start_age');
    let end = num('f_smoking_end_age');
    if(end===null) end = num('f_age');   // 終了年齢が空＝現在喫煙中とみなし年齢を代入
    let py = '';
    if(cigs!==null && start!==null && end!==null && (end-start)>0){
      py = Math.round((cigs/20)*(end-start)*10)/10;
    }
    $('f_pack_years').value = py;
  }

  // ===== Supabase REST =====
  async function apiGet(){
    const res = await fetch(TABLE + '?select=*&order=id.desc', { headers: H });
    if(!res.ok) throw new Error('取得失敗 ' + res.status + '：' + (await res.text()));
    return res.json();
  }
  async function apiInsert(data){
    const res = await fetch(TABLE, { method:'POST', headers: H, body: JSON.stringify(data) });
    if(!res.ok) throw new Error('登録失敗 ' + res.status + '：' + (await res.text()));
  }
  async function apiUpdate(id, data){
    const res = await fetch(TABLE + '?id=eq.' + id, { method:'PATCH', headers: H, body: JSON.stringify(data) });
    if(!res.ok) throw new Error('更新失敗 ' + res.status + '：' + (await res.text()));
  }
  async function apiDelete(id){
    const res = await fetch(TABLE + '?id=eq.' + id, { method:'DELETE', headers: H });
    if(!res.ok) throw new Error('削除失敗 ' + res.status + '：' + (await res.text()));
  }
  async function reload(){
    if(!CONFIGURED) return;
    try { records = await apiGet(); render(); aggregate(); }
    catch(e){ banner(false, 'サーバーに接続できませんでした：' + e.message); }
  }

  // ===== ユーティリティ =====
  function today(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function num(id){ const el=$(id); if(!el) return null; const v=el.value; return (v===''||isNaN(parseFloat(v)))?null:parseFloat(v); }

  // ===== 保存 =====
  async function save(){
    if(!CONFIGURED){ alert('先に SUPABASE_URL と SUPABASE_KEY を設定してください。'); return; }
    const pid = $('f_patient_id').value.trim();
    if(!pid){ alert('患者ID（匿名）を入力してください。'); $('f_patient_id').focus(); return; }
    const data = {};
    FIELDS.forEach(f => {
      const el = $('f_' + f.k); let v = (el.value||'').trim();
      if(v === '') { data[f.k] = null; return; }
      data[f.k] = (f.type === 'num') ? Number(v) : v;
    });
    if(!data.visit_date) data.visit_date = today();
    const btn = $('btnSave'); btn.disabled = true; const orig = btn.textContent; btn.textContent = '保存中…';
    try {
      if(editingId) await apiUpdate(editingId, data);
      else await apiInsert(data);
      endEdit();
      await reload();
      window.scrollTo({top:0, behavior:'smooth'});
    } catch(e){ alert('保存に失敗：' + e.message); }
    finally { btn.disabled = false; btn.textContent = orig; }
  }

  function edit(id){
    const r = records.find(x=>String(x.id)===String(id)); if(!r) return;
    editingId = r.id;
    FIELDS.forEach(f => { const el=$('f_'+f.k); if(el) el.value = (r[f.k]==null?'':r[f.k]); });
    $('formTitle').textContent = '問診を編集';
    $('btnSave').textContent = '更新する';
    $('btnCancel').style.display = 'inline-block';
    document.querySelectorAll('details.sec').forEach(d=>d.open=true);
    render(); window.scrollTo({top:0, behavior:'smooth'});
  }
  function endEdit(){
    editingId = null;
    FIELDS.forEach(f => { const el=$('f_'+f.k); if(el) el.value=''; });
    $('f_visit_date').value = today();
    $('formTitle').textContent = '新しい問診を記録';
    $('btnSave').textContent = '記録する';
    $('btnCancel').style.display = 'none';
    document.querySelectorAll('details.sec').forEach((d,i)=>d.open=(i===0));
  }
  async function remove(id){
    const r = records.find(x=>String(x.id)===String(id));
    if(!confirm('「'+(r?r.patient_id:'')+'」の問診を削除します。よろしいですか？')) return;
    try { await apiDelete(id); if(String(editingId)===String(id)) endEdit(); await reload(); }
    catch(e){ alert('削除に失敗：' + e.message); }
  }

  // ===== 一覧 =====
  function render(){
    const q = $('searchBox').value.trim().toLowerCase();
    const view = records.filter(r=>{
      if(!q) return true;
      return String(r.patient_id||'').toLowerCase().includes(q) || String(r.visit_reason||'').toLowerCase().includes(q);
    });
    $('count').textContent = '全'+records.length+'件'+(view.length!==records.length?'／表示'+view.length+'件':'');
    const listEl = $('list');
    if(view.length===0){
      listEl.innerHTML = '<div class="empty">'+(records.length===0?'まだ記録がありません。上のフォームから追加してください。':'条件に合う記録がありません。')+'</div>';
      return;
    }
    listEl.innerHTML = view.map(r=>{
      const editing = (String(editingId)===String(r.id));
      // 「あり」の既往をタグ表示（最大6件）
      const tags = FIELDS.filter(f=>f.type==='yn' && r[f.k]==='あり').slice(0,6)
        .map(f=>'<span class="tag">'+esc(f.label)+'</span>').join('');
      const sexAge = [r.age?esc(r.age)+'歳':'', r.sex?esc(r.sex):''].filter(Boolean).join('・');
      const smk = r.smoking_status?'／喫煙:'+esc(r.smoking_status):'';
      return '<div class="rec '+(editing?'editing':'')+'">'+
        '<div class="rec-top"><div>'+
          '<span class="rec-name">'+esc(r.patient_id)+'</span>'+
          '<div class="rec-meta">受診日 '+esc((r.visit_date||'—').slice(0,10))+
            (sexAge?'　｜　'+sexAge:'')+smk+
            (r.visit_reason?'　｜　'+esc(r.visit_reason):'')+'</div>'+
          (tags?'<div class="tags">'+tags+'</div>':'')+
        '</div>'+
        '<div class="rec-actions">'+
          '<button class="edit" onclick="edit(\''+r.id+'\')">編集</button>'+
          '<button class="danger" onclick="remove(\''+r.id+'\')">削除</button>'+
        '</div></div>'+
      '</div>';
    }).join('');
  }

  // ===== 集計（画面内サマリー）=====
  function mean_sd(arr){
    const n=arr.length; if(!n) return null;
    const m=arr.reduce((a,b)=>a+b,0)/n;
    const sd=n>1?Math.sqrt(arr.reduce((a,b)=>a+(b-m)*(b-m),0)/(n-1)):0;
    return {n, m:Math.round(m*10)/10, sd:Math.round(sd*10)/10};
  }
  function countBy(key){
    const c={}; records.forEach(r=>{ const v=r[key]; if(v==null||v==='') return; c[v]=(c[v]||0)+1; }); return c;
  }
  function aggregate(){
    const N = records.length;
    const ages = records.map(r=>r.age).filter(v=>typeof v==='number');
    const a = mean_sd(ages);
    const sex = countBy('sex');
    const smk = countBy('smoking_status');
    const stat = (k,v)=>'<div class="stat"><div class="k">'+esc(k)+'</div><div class="v">'+v+'</div></div>';
    let html = stat('登録件数', N+' 件');
    html += stat('年齢 (mean±SD)', a?(a.m+' ± '+a.sd):'—');
    html += stat('性別', '男 '+(sex['男']||0)+' / 女 '+(sex['女']||0));
    html += stat('喫煙', '非'+(smk['非喫煙']||0)+' / 元'+(smk['元喫煙']||0)+' / 現'+(smk['現喫煙']||0));
    $('summary').innerHTML = html;

    // 有訴率（あり/なし項目の「あり」割合トップ）
    if(N===0){ $('prevalence').innerHTML=''; return; }
    const prev = FIELDS.filter(f=>f.type==='yn').map(f=>{
      let pos=0, valid=0;
      records.forEach(r=>{ const v=r[f.k]; if(v!=='あり'&&v!=='なし') return; valid++; if(v==='あり') pos++; });
      return {label:f.label, pos, valid, rate:valid?pos/valid:0};
    }).filter(p=>p.valid>0 && p.pos>0).sort((x,y)=>y.rate-x.rate).slice(0,10);
    if(prev.length===0){ $('prevalence').innerHTML='<div class="foot">「あり」の該当がまだありません。</div>'; return; }
    $('prevalence').innerHTML = '<h2 style="margin-top:8px">「あり」割合（上位）</h2>' +
      prev.map(p=>'<div class="prow"><div class="plabel">'+esc(p.label)+'</div>'+
        '<div class="pbar" style="width:'+Math.round(p.rate*160)+'px"></div>'+
        '<div class="ppct">'+Math.round(p.rate*1000)/10+'%（'+p.pos+'/'+p.valid+'）</div></div>').join('');
  }

  // ===== 書き出し =====
  function download(filename, text, mime){
    const blob = new Blob([text], {type: mime}); const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename;
    document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url), 1000);
  }
  function stamp(){ const d=new Date(); return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0'); }
  function exportJson(){ if(!records.length){ alert('書き出す記録がありません。'); return; } download('monshin_'+stamp()+'.json', JSON.stringify(records,null,2), 'application/json'); }
  function csvCell(v){ return '"' + (v==null?'':String(v)).replace(/"/g,'""') + '"'; }
  function exportCsv(){
    if(!records.length){ alert('書き出す記録がありません。'); return; }
    const cols = ['id'].concat(FIELDS.map(f=>f.k)).concat(['created_at']);
    const head = ['ID'].concat(FIELDS.map(f=>f.label)).concat(['登録日時']);
    const lines = [head.map(csvCell).join(',')];
    records.forEach(r=> lines.push(cols.map(c=>csvCell(r[c])).join(',')));
    download('monshin_'+stamp()+'.csv', '﻿'+lines.join('\r\n'), 'text/csv');
  }

  // ===== 接続バナー =====
  function banner(ok, msg){ const el=$('connBanner'); el.className='conn '+(ok?'ok':'ng'); el.innerHTML=msg; }

  // ===== 起動 =====
  buildForm();
  $('f_visit_date').value = today();
  $('btnSave').addEventListener('click', save);
  $('btnCancel').addEventListener('click', endEdit);
  $('searchBox').addEventListener('input', render);
  $('btnReload').addEventListener('click', reload);
  $('btnExportJson').addEventListener('click', exportJson);
  $('btnExportCsv').addEventListener('click', exportCsv);
  window.edit = edit; window.remove = remove;

  if(!CONFIGURED){
    banner(false, '未接続：スクリプト冒頭の <code>SUPABASE_URL</code> と <code>SUPABASE_KEY</code> を自分のプロジェクトの値に置き換えてください。');
  } else {
    banner(true, '接続先：<code>' + esc(SUPABASE_URL) + '</code>（テーブル monshin_records）— クラウド保存で全端末共有中。');
    reload();
  }
</script>
</body>
</html>
